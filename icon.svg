<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 배경 그리드 점 패턴 (AI 느낌) -->
  <g opacity="0.12" fill="#60a5fa">
    <circle cx="80"  cy="80"  r="3"/><circle cx="160" cy="80"  r="3"/><circle cx="240" cy="80"  r="3"/><circle cx="320" cy="80"  r="3"/><circle cx="400" cy="80"  r="3"/>
    <circle cx="80"  cy="160" r="3"/><circle cx="160" cy="160" r="3"/><circle cx="240" cy="160" r="3"/><circle cx="320" cy="160" r="3"/><circle cx="400" cy="160" r="3"/>
    <circle cx="80"  cy="240" r="3"/><circle cx="160" cy="240" r="3"/><circle cx="320" cy="240" r="3"/><circle cx="400" cy="240" r="3"/>
    <circle cx="80"  cy="320" r="3"/><circle cx="160" cy="320" r="3"/><circle cx="240" cy="320" r="3"/><circle cx="320" cy="320" r="3"/><circle cx="400" cy="320" r="3"/>
    <circle cx="80"  cy="400" r="3"/><circle cx="160" cy="400" r="3"/><circle cx="240" cy="400" r="3"/><circle cx="320" cy="400" r="3"/><circle cx="400" cy="400" r="3"/>
  </g>

  <!-- 글로우 레이어 (블루 후광) -->
  <g filter="url(#soft-glow)" opacity="0.5">
    <polygon points="256,88 148,390 196,390 256,222 316,390 364,390" fill="#3b82f6"/>
  </g>

  <!-- A 메인 획 -->
  <polygon points="256,88 148,390 196,390 256,222 316,390 364,390" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- 가운데 컷아웃 -->
  <polygon points="256,168 222,278 290,278" fill="#0d1117"/>

  <!-- 크로스바 -->
  <rect x="186" y="288" width="140" height="24" rx="12" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- 노드 포인트 (AI 느낌 서킷 점) -->
  <circle cx="256" cy="88"  r="8" fill="#93c5fd" filter="url(#blur-glow)"/>
  <circle cx="148" cy="390" r="7" fill="#60a5fa" filter="url(#blur-glow)"/>
  <circle cx="364" cy="390" r="7" fill="#60a5fa" filter="url(#blur-glow)"/>
  <circle cx="186" cy="300" r="5" fill="#bfdbfe"/>
  <circle cx="326" cy="300" r="5" fill="#bfdbfe"/>

  <!-- 연결선 (서킷 느낌) -->
  <line x1="148" y1="390" x2="186" y2="390" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
  <line x1="326" y1="390" x2="364" y2="390" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
</svg>
