<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- 배경 그리드 점 -->
  <g opacity="0.15" fill="#ffffff">
    <circle cx="80"  cy="80"  r="3"/><circle cx="160" cy="80"  r="3"/><circle cx="240" cy="80"  r="3"/><circle cx="320" cy="80"  r="3"/><circle cx="432" cy="80"  r="3"/>
    <circle cx="80"  cy="160" r="3"/><circle cx="160" cy="160" r="3"/><circle cx="320" cy="160" r="3"/><circle cx="432" cy="160" r="3"/>
    <circle cx="80"  cy="240" r="3"/><circle cx="432" cy="240" r="3"/>
    <circle cx="80"  cy="340" r="3"/><circle cx="432" cy="340" r="3"/>
    <circle cx="80"  cy="432" r="3"/><circle cx="160" cy="432" r="3"/><circle cx="320" cy="432" r="3"/><circle cx="432" cy="432" r="3"/>
  </g>

  <!-- 글로우 레이어 -->
  <g filter="url(#soft-glow)" opacity="0.35">
    <polygon points="256,74 142,360 192,360 256,200 320,360 370,360" fill="#ffffff"/>
  </g>

  <!-- A 메인 -->
  <polygon points="256,74 142,360 192,360 256,200 320,360 370,360" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- 컷아웃 -->
  <polygon points="256,158 220,268 292,268" fill="#2563eb"/>

  <!-- 크로스바 -->
  <rect x="180" y="278" width="152" height="22" rx="11" fill="url(#glow)" filter="url(#blur-glow)"/>

  <!-- 노드 포인트 -->
  <circle cx="256" cy="74"  r="9" fill="#ffffff" filter="url(#blur-glow)"/>
  <circle cx="142" cy="360" r="7" fill="#bfdbfe" filter="url(#blur-glow)"/>
  <circle cx="370" cy="360" r="7" fill="#bfdbfe" filter="url(#blur-glow)"/>
  <circle cx="180" cy="289" r="5" fill="#e0f2fe"/>
  <circle cx="332" cy="289" r="5" fill="#e0f2fe"/>

  <!-- -TF 텍스트: A 꼭짓점 우측 상단 -->
  <text x="292" y="108" font-family="'Arial',sans-serif" font-size="48" font-weight="300" text-anchor="start" fill="#ffffff" opacity="0.65" letter-spacing="1">-TF</text>
</svg>
