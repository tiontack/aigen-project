name: Sync Google Calendar

on:
  schedule:
    - cron: '*/10 * * * *'          # 10분마다
  workflow_dispatch:                # 수동 실행 버튼도 유지

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Google Calendar sync
        run: node scripts/sync-gcal.js
