name: Sync Google Calendar

on:
  schedule:
    - cron: '*/30 * * * *'       # 30분마다 (GitHub 최소 5분, 안정적 간격)
  workflow_dispatch:              # 수동 실행 버튼 유지
  push:
    branches: [main]             # 코드 push 시에도 1회 실행 → 60일 비활성화 방지

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Google Calendar sync
        run: node scripts/sync-gcal.js
